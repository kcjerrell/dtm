name: pr-e2e

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  e2e:
    name: Build Debug App + WDIO E2E
    runs-on: macos-latest
    timeout-minutes: 45

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        id: rust-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run gen-icons
        
      - name: Build debug app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: npm run tauri build -- --debug

      - name: Set up test data
        run: sh scripts/test-setup.sh

      - name: Run WDIO tests
        run: npm run wdio

      - name: Upload WDIO failure screenshots
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: wdio-failure-screenshots
          path: test/artifacts/screenshots
          if-no-files-found: ignore

      - name: Save Rust cache
        if: ${{ always() && !cancelled() }}
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ steps.rust-cache-restore.outputs.cache-primary-key }}
